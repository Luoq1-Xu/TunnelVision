[project]
name = "tunnelvision-cv"
version = "0.1.0"
description = "Ball detection, tracking, and 3D trajectory reconstruction for pitch tunneling analysis"
requires-python = ">=3.11"
dependencies = [
    "ultralytics>=8.3",
    "opencv-python>=4.10",
    "torch>=2.4",
    "torchvision",
    "numpy",
    "scipy",
    "supervision>=0.23",
    "lap",
    "av",
    "pybaseball>=2.2",
    "pandas",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "ipykernel",
    "matplotlib",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tunnelvision_cv"]

[tool.ruff]
line-length = 100
